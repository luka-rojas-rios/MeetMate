<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Bienvenida a Meet-Mate</title>
  <link rel="stylesheet" href="static/style.css" />
  <style>
    body {
      background: linear-gradient(to right, #83a4d4, #b6fbff);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .welcome-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .welcome-box img {
      width: 250px;
      margin-bottom: 20px;
    }

    .welcome-box h1 {
      font-size: 2em;
      color: #333;
    }

    .welcome-box p {
      font-size: 1.1em;
      margin: 15px 0 30px;
      color: #555;
    }

    .welcome-box button {
      background-color: #44667b;
      color: white;
      padding: 12px 20px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .welcome-box button:hover {
      background-color: #36546a;
    }
  </style>
</head>
<body>
  <div class="welcome-box">
    <img src="static/welcome.svg" alt="Ilustración de bienvenida" />
    <h1>¡Hello, <span id="user-name"></span> 👋!</h1>
    <p>Thank you for trusting <strong>Meet-Mate</strong>. We are delighted to have you with us.</p>
    <button onclick="logout()">Log out</button>
  </div>

  <script>
    const user = localStorage.getItem("user");

    if (!user) {
      window.location.href = "index.html";
    } else {
      document.getElementById("user-name").textContent = user;
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
