<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Student Form</title>
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .form-wrapper {
      width: 100%;
      max-width: 700px;
    }

    h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    /* Formulario */
    form {
      background-color: #ffffff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }

    select,
    input[type="text"],
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    select:focus,
    input:focus {
      border-color: #0077cc;
      outline: none;
      box-shadow: 0 0 4px rgba(0, 119, 204, 0.5);
    }

    /* Botón de envío */
    button[type="submit"] {
      background-color: #0077cc;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      margin-top: 25px;
      transition: background-color 0.3s;
    }

    button[type="submit"]:hover {
      background-color: #005fa3;
    }

    /* Sección condicional */
    .hidden {
      display: none;
    }

    /* Caja de mensaje */
    .message-box {
      margin-top: 30px;
      background: #e9f5ff;
      padding: 20px;
      border-left: 5px solid #0077cc;
      border-radius: 5px;
    }

    .message-box p {
      margin-bottom: 10px;
    }

    .retry-form button {
      background-color: #0077cc;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .retry-form button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>


  <div class="form-wrapper">
    <h2>Student Form</h2>
    <form id="studentForm" method="POST" action="/submit_match_profile">
      <!-- Tipo de Estudiante -->
      <label for="user_type">Student type:</label>
      <select id="user_type" name="user_type" required>
        <option value="">Select an option</option>
        <option value="local">Local</option>
        <option value="exchange">Exchange</option>
      </select>

      <!-- Selección de Universidad -->
      <div id="universitySection" class="hidden">
        <label for="country">Country:</label>
        <select id="country" name="country" required>
          <option value="">Select a country</option>
        </select>

        <label for="city">City:</label>
        <select id="city" name="city" required>
          <option value="">Select a city</option>
        </select>

        <label for="university">University:</label>
        <select id="university" name="university" required>
          <option value="">Select a university</option>
        </select>
      </div>

      <!-- Ocultos: se rellenan desde JS -->
      <input type="hidden" name="home_university" id="home_university" />
      <input type="hidden" name="exchange_university" id="exchange_university" />

      <!-- Idiomas -->
      <label for="language">Language 1:</label>
      <select id="language" name="language" required>
        <option value="">Select a language</option>
      </select>

      <label for="language2">Language 2:</label>
      <select id="language2" name="language2">
        <option value="">None</option>
      </select>

      <!-- Hobbies -->
      <label for="hobby_1">Hobby 1:</label>
      <select id="hobby_1" name="hobby_1">
        <option value="">Select one</option>
      </select>

      <label for="hobby_2">Hobby 2:</label>
      <select id="hobby_2" name="hobby_2">
        <option value="">Seleccione another one</option>
      </select>

      <!-- Deportes -->
      <label for="favorite_sport_1">First favorite sport:</label>
      <select id="favorite_sport_1" name="favorite_sport_1">
        <option value="">Seleccione one</option>
      </select>

      <label for="favorite_sport_2">Second favorite sport:</label>
      <select id="favorite_sport_2" name="favorite_sport_2">
        <option value="">Select another one</option>
      </select>

      <br><br>
      <button type="submit">Send</button>
    </form>

    <!-- Mensaje de resultado condicional -->
    {% if message %}
      <div class="message-box">
        <p>{{ message }}</p>
        <form method="GET" action="/match-profile" class="retry-form">
          <button type="submit">Try again</button>
        </form>
      </div>
    {% endif %}
  </div>

    const citySelect = document.getElementById('city');
    const universityCombo = document.getElementById('university');

    for (let country in universityData) {
      let option = document.createElement('option');
      option.value = country;
      option.textContent = country;
      countrySelect.appendChild(option);
    }

    countrySelect.addEventListener('change', function () {
      citySelect.innerHTML = '<option value="">Select a city</option>';
      universityCombo.innerHTML = '<option value="">Select a university</option>';
      const cities = universityData[this.value];
      for (let city in cities) {
        let option = document.createElement('option');
        option.value = city;
        option.textContent = city;
        citySelect.appendChild(option);
      }
    });

    citySelect.addEventListener('change', function () {
      universityCombo.innerHTML = '<option value="">Select a university</option>';
      const universities = universityData[countrySelect.value][this.value];
      universities.forEach(univ => {
        let option = document.createElement('option');
        option.value = univ;
        option.textContent = univ;
        universityCombo.appendChild(option);
      });
    });

    document.getElementById('user_type').addEventListener('change', function () {
      const section = document.getElementById('universitySection');
      section.classList.toggle('hidden', this.value === '');
    });

    languages.forEach(lang => {
      ['language', 'language2'].forEach(id => {
        const opt = document.createElement('option');
        opt.value = lang;
        opt.textContent = lang;
        document.getElementById(id).appendChild(opt.cloneNode(true));
      });
    });

    hobbiesList.forEach(hobby => {
      ['hobby_1', 'hobby_2'].forEach(id => {
        const opt = document.createElement('option');
        opt.value = hobby;
        opt.textContent = hobby;
        document.getElementById(id).appendChild(opt.cloneNode(true));
      });
    });

    sportsList.forEach(sport => {
      ['favorite_sport_1', 'favorite_sport_2'].forEach(id => {
        const opt = document.createElement('option');
        opt.value = sport;
        opt.textContent = sport;
        document.getElementById(id).appendChild(opt.cloneNode(true));
      });
    });

    document.getElementById("studentForm").addEventListener("submit", function (e) {
      const studentType = document.getElementById("user_type").value;
      const selectedUniversity = document.getElementById("university").value;

      if (studentType === "exchange") {
        document.getElementById("exchange_university").value = selectedUniversity;
        document.getElementById("home_university").value = "";
      } else {
        document.getElementById("home_university").value = selectedUniversity;
        document.getElementById("exchange_university").value = "";
      }
    });
  </script>
</body>
</html>
